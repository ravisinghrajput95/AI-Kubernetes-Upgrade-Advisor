name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  schedule:
    # Weekly bit-rot canary: catches dependency breakage and dead upstream
    # doc URLs before a visitor clones the repo and hits them.
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - name: ruff lint
        run: ruff check src tests
      - name: ruff format check
        run: ruff format --check src tests
      - name: static-table freshness
        # Warn (never fail) when the API lifecycle / compat matrices haven't
        # been reviewed recently — they must be refreshed each k8s release.
        run: |
          python - <<'EOF'
          import datetime
          from k8s_upgrade_advisor.analysis.api_lifecycle import TABLES_LAST_REVIEWED
          reviewed = datetime.date.fromisoformat(TABLES_LAST_REVIEWED)
          age = (datetime.date.today() - reviewed).days
          if age > 90:
              print(f"::warning title=Static tables stale::API lifecycle/compat tables "
                    f"last reviewed {age} days ago ({TABLES_LAST_REVIEWED}). "
                    f"Review against the latest Kubernetes release.")
          else:
              print(f"tables reviewed {age} days ago — fresh")
          EOF

  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - run: helm lint deploy/helm/k8s-upgrade-advisor
      - run: helm template advisor deploy/helm/k8s-upgrade-advisor > /dev/null

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install -e ".[api,dev]"
      - name: pytest
        run: pytest -v

  build-image:
    runs-on: ubuntu-latest
    needs: [lint, test]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          push: false
          tags: k8s-upgrade-advisor:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Smoke test container
        # Catches broken entrypoints and the packaged-frontend path: the UI
        # must serve from a wheel install, not just an editable checkout.
        run: |
          docker run -d --name advisor -p 8080:8080 k8s-upgrade-advisor:ci
          for i in $(seq 1 30); do
            curl -fsS http://127.0.0.1:8080/livez && break || sleep 1
          done
          curl -fsS http://127.0.0.1:8080/readyz
          curl -fsS http://127.0.0.1:8080/ | grep -q "k8s-upgrade-advisor"
          curl -fsS http://127.0.0.1:8080/metrics | grep -q advisor_build_info
          docker rm -f advisor
      - name: Log in to GHCR
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push release image
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/k8s-upgrade-advisor:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/k8s-upgrade-advisor:latest
          cache-from: type=gha

  assess-example:
    # Dogfood: run the CLI against the bundled EKS fixture and publish the
    # markdown report as a build artifact. --fail-on never: this job shows
    # the tool working, the fixture is intentionally not upgrade-ready.
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e .
      - run: |
          k8s-upgrade-advisor assess -s 1.26 -t 1.29 \
            --snapshot tests/fixtures/eks_1_26.json \
            --dry-run --fail-on never \
            --md example-report.md --html example-report.html
      - uses: actions/upload-artifact@v4
        with:
          name: example-assessment
          path: example-report.*
