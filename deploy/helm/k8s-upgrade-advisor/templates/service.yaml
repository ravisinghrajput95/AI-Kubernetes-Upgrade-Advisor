apiVersion: v1
kind: Service
metadata:
  name: {{ include "advisor.fullname" . }}
  labels: {{- include "advisor.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
  selector: {{- include "advisor.selectorLabels" . | nindent 4 }}
